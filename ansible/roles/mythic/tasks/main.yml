---
# Docker is installed only here for Mythic (mythic-cli / containers). Other hosts do not use Docker.
- name: Install packages required for Mythic (Docker, git, curl)
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - git
      - lsb-release
    state: present
  when: ansible_os_family == "Debian"

- name: Install Docker (get.docker.com)
  ansible.builtin.shell: |
    curl -fsSL https://get.docker.com -o get-docker.sh
    sh get-docker.sh
    usermod -aG docker ubuntu
  args:
    creates: /usr/bin/docker

- name: Install Docker Compose (standalone binary)
  ansible.builtin.get_url:
    url: https://github.com/docker/compose/releases/latest/download/docker-compose-Linux-x86_64
    dest: /usr/local/bin/docker-compose
    mode: "0755"

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Ensure /opt exists for Mythic install
  ansible.builtin.file:
    path: /opt
    state: directory
    mode: "0755"

- name: Check if Mythic repo already exists
  ansible.builtin.stat:
    path: /opt/mythic/.git
  register: mythic_git_check

- name: Remove existing /opt/mythic when it is not a Mythic git checkout
  ansible.builtin.file:
    path: /opt/mythic
    state: absent
  when: not mythic_git_check.stat.exists

- name: Clone Mythic repository
  ansible.builtin.git:
    repo: https://github.com/its-a-feature/Mythic.git
    dest: /opt/mythic
    version: master
    force: no
    depth: 1
  when: not mythic_git_check.stat.exists

- name: Update Mythic repository (pull latest)
  ansible.builtin.git:
    repo: https://github.com/its-a-feature/Mythic.git
    dest: /opt/mythic
    version: master
    update: yes
    force: no
  when: mythic_git_check.stat.exists

# Wildcard certs are synced to /etc/aegis/certs in site.yml before this role.
# Mythic's nginx-docker maps nginx-docker/ssl/ -> /etc/ssl/private in the mythic_nginx container.
- name: Check for wildcard certificate material from redirector sync
  ansible.builtin.stat:
    path: /etc/aegis/certs/fullchain.pem
  register: mythic_wildcard_cert

- name: Ensure Mythic nginx-docker SSL directory exists
  ansible.builtin.file:
    path: /opt/mythic/nginx-docker/ssl
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: mythic_wildcard_cert.stat.exists

- name: Copy wildcard chain and key into Mythic repo (nginx-docker/ssl -> /etc/ssl/private in container)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    mode: "{{ item.mode }}"
  loop:
    - {
        src: /etc/aegis/certs/fullchain.pem,
        dest: /opt/mythic/nginx-docker/ssl/fullchain.pem,
        mode: "0644",
      }
    - {
        src: /etc/aegis/certs/privkey.pem,
        dest: /opt/mythic/nginx-docker/ssl/privkey.pem,
        mode: "0600",
      }
  when: mythic_wildcard_cert.stat.exists

# Upstream template uses mythic-cert.crt / mythic-ssl.key; replace path only so edits match any whitespace.
# Copies above place fullchain.pem and privkey.pem into nginx-docker/ssl/ -> /etc/ssl/private in container.
- name: Point Mythic nginx template at LE fullchain (services.conf.template)
  ansible.builtin.replace:
    path: /opt/mythic/nginx-docker/config/templates/services.conf.template
    regexp: '/etc/ssl/private/mythic-cert\.crt'
    replace: "/etc/ssl/private/fullchain.pem"
  when: mythic_wildcard_cert.stat.exists

- name: Point Mythic nginx template at LE privkey (services.conf.template)
  ansible.builtin.replace:
    path: /opt/mythic/nginx-docker/config/templates/services.conf.template
    regexp: '/etc/ssl/private/mythic-ssl\.key'
    replace: "/etc/ssl/private/privkey.pem"
  when: mythic_wildcard_cert.stat.exists

- name: Build mythic-cli binary (uses Docker to extract from official image)
  ansible.builtin.command: make
  args:
    chdir: /opt/mythic
    creates: /opt/mythic/mythic-cli

# mythic-cli start pulls images and can take many minutes; short async timeouts fail with no .rc on the result.
- name: Start Mythic services (mythic-cli start)
  ansible.builtin.command: ./mythic-cli start
  args:
    chdir: /opt/mythic
  register: mythic_start
  async: 7200
  poll: 30
  failed_when: false
  changed_when: (mythic_start.rc | default(-1) | int) == 0

- name: Ensure Mythic is running (retry start if first run failed or timed out)
  ansible.builtin.command: ./mythic-cli start
  args:
    chdir: /opt/mythic
  when: (mythic_start.rc | default(-1) | int) != 0
  register: mythic_start_retry
  async: 7200
  poll: 30
  failed_when: false
  changed_when: (mythic_start_retry.rc | default(-1) | int) == 0

# Install C2 profiles and agents (download Docker images; 30s between each).
- name: Wait for Mythic to be ready before installing profiles/agents
  ansible.builtin.pause:
    seconds: 30

- name: Install C2 profile – HTTP
  ansible.builtin.command: ./mythic-cli install github https://github.com/MythicC2Profiles/http
  args:
    chdir: /opt/mythic
  register: _install_http
  failed_when: false
  changed_when: _install_http.rc == 0

- name: Pause 30s after HTTP profile
  ansible.builtin.pause:
    seconds: 30

- name: Install C2 profile – DNS
  ansible.builtin.command: ./mythic-cli install github https://github.com/MythicC2Profiles/dns
  args:
    chdir: /opt/mythic
  register: _install_dns
  failed_when: false
  changed_when: _install_dns.rc == 0

- name: Pause 30s after DNS profile
  ansible.builtin.pause:
    seconds: 30

- name: Install C2 profile – HTTPX
  ansible.builtin.command: ./mythic-cli install github https://github.com/MythicC2Profiles/httpx
  args:
    chdir: /opt/mythic
  register: _install_httpx
  failed_when: false
  changed_when: _install_httpx.rc == 0

- name: Pause 30s after HTTPX profile
  ansible.builtin.pause:
    seconds: 30

- name: Install agent – Apollo
  ansible.builtin.command: ./mythic-cli install github https://github.com/MythicAgents/Apollo
  args:
    chdir: /opt/mythic
  register: _install_apollo
  failed_when: false
  changed_when: _install_apollo.rc == 0

- name: Pause 30s after Apollo agent
  ansible.builtin.pause:
    seconds: 30

- name: Install agent – Poseidon
  ansible.builtin.command: ./mythic-cli install github https://github.com/MythicAgents/poseidon
  args:
    chdir: /opt/mythic
  register: _install_poseidon
  failed_when: false
  changed_when: _install_poseidon.rc == 0
