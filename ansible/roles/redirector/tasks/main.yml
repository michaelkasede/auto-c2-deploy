---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Install Certbot
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
      - python3-pip
    state: present

- name: Resolve Certbot DNS pip package name
  ansible.builtin.set_fact:
    redirector_certbot_dns_pip_package_resolved: >-
      {{
        redirector_certbot_dns_pip_package
        if (redirector_certbot_dns_pip_package | default('', true) | length) > 0
        else ('certbot-dns-' ~ (redirector_certbot_dns_plugin | regex_replace('^dns-', '')))
      }}

- name: Install Certbot DNS plugin (pip)
  ansible.builtin.pip:
    name: "{{ redirector_certbot_dns_pip_package_resolved }}"
    state: present
    executable: pip3

- name: Resolve CERTBOT_EMAIL, DUCKDNS_TOKEN (optional), and optional DNS propagation wait
  ansible.builtin.set_fact:
    certbot_email: "{{ lookup('env', 'CERTBOT_EMAIL') | trim }}"
    duckdns_token: "{{ lookup('env', 'DUCKDNS_TOKEN') | trim }}"
    duckdns_propagation_seconds: >-
      {{ (lookup('env', 'DUCKDNS_PROPAGATION_SECONDS') | default(redirector_duckdns_propagation_seconds | string, true) | trim) | int }}

- name: Require DUCKDNS_TOKEN when using dns-duckdns
  ansible.builtin.assert:
    that:
      - duckdns_token | length > 0
    fail_msg: >-
      redirector_certbot_dns_plugin is dns-duckdns but DUCKDNS_TOKEN is not set. Export it:
        export DUCKDNS_TOKEN="your-token"
  when: redirector_certbot_dns_plugin == 'dns-duckdns'

- name: Require DNS plugin CLI options when not using DuckDNS
  ansible.builtin.assert:
    that:
      - redirector_certbot_dns_plugin_options | length > 0
    fail_msg: >-
      For redirector_certbot_dns_plugin other than dns-duckdns, set redirector_certbot_dns_plugin_options
      to the certbot flags your provider needs (install the matching pip plugin above). Example for Cloudflare:
        redirector_certbot_dns_plugin: dns-cloudflare
        redirector_certbot_dns_plugin_options: ["--dns-cloudflare-credentials", "/root/.secrets/cloudflare.ini"]
  when: redirector_certbot_dns_plugin != 'dns-duckdns'

- name: Require CERTBOT_EMAIL for certificate issuance
  ansible.builtin.assert:
    that:
      - certbot_email | length > 0
    fail_msg: >-
      CERTBOT_EMAIL is not set.  Export it before running the playbook:
        export CERTBOT_EMAIL="you@example.com"

# Same pattern as: certbot certonly --authenticator <plugin> ... -d <base> -d "*.<base>"
- name: Request SSL certificate (apex + wildcard, DuckDNS)
  ansible.builtin.command:
    argv:
      - certbot
      - certonly
      - --non-interactive
      - --agree-tos
      - --email
      - "{{ certbot_email }}"
      - --preferred-challenges
      - dns
      - --authenticator
      - "{{ redirector_certbot_dns_plugin }}"
      - --dns-duckdns-token
      - "{{ duckdns_token }}"
      - --dns-duckdns-propagation-seconds
      - "{{ duckdns_propagation_seconds | string }}"
      - -d
      - "{{ base_domain }}"
      - -d
      - "*.{{ base_domain }}"
  args:
    creates: "{{ redirector_ssl_cert_path }}"
  when: redirector_certbot_dns_plugin == 'dns-duckdns'

- name: Request SSL certificate (apex + wildcard, custom DNS plugin)
  ansible.builtin.command:
    argv: "{{ certbot_certonly_argv }}"
  vars:
    certbot_certonly_argv: >-
      {{
        (
          [
            'certbot', 'certonly', '--non-interactive', '--agree-tos', '--email', certbot_email,
            '--preferred-challenges', 'dns', '--authenticator', redirector_certbot_dns_plugin
          ]
          + redirector_certbot_dns_plugin_options
          + ['-d', base_domain, '-d', '*.' ~ base_domain]
        )
      }}
  args:
    creates: "{{ redirector_ssl_cert_path }}"
  when: redirector_certbot_dns_plugin != 'dns-duckdns'

- name: Create decoy directory
  ansible.builtin.file:
    path: /opt/decoy
    state: directory
    mode: '0755'

- name: Deploy Decoy docker-compose
  ansible.builtin.template:
    src: decoy-docker-compose.yml.j2
    dest: /opt/decoy/docker-compose.yml

- name: Start Decoy container
  ansible.builtin.shell: |
    docker compose -f /opt/decoy/docker-compose.yml up -d
  args:
    chdir: /opt/decoy

- name: Deploy Smart Redirector configuration
  ansible.builtin.template:
    src: smart-redirector.conf.j2
    dest: /etc/nginx/sites-available/aegis-redirector.conf
  notify: Reload Nginx
  tags: [redirector_config, update_decoy]

- name: Enable Smart Redirector
  ansible.builtin.file:
    src: /etc/nginx/sites-available/aegis-redirector.conf
    dest: /etc/nginx/sites-enabled/aegis-redirector.conf
    state: link

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx

- name: Validate Nginx configuration (certs + smart redirector)
  ansible.builtin.command: nginx -t
  changed_when: false
