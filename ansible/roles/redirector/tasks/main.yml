---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Install Certbot
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
      - python3-pip
    state: present

- name: Install Certbot DuckDNS DNS plugin
  ansible.builtin.pip:
    name: certbot-dns-duckdns
    state: present
    executable: pip3

- name: Resolve DUCKDNS_TOKEN and CERTBOT_EMAIL from environment
  ansible.builtin.set_fact:
    duckdns_token: "{{ lookup('env', 'DUCKDNS_TOKEN') | trim }}"
    certbot_email: "{{ lookup('env', 'CERTBOT_EMAIL') | trim }}"

- name: Require DUCKDNS_TOKEN for DNS-01 certificate issuance
  ansible.builtin.assert:
    that:
      - duckdns_token | length > 0
    fail_msg: >-
      DUCKDNS_TOKEN is not set.  Export it before running the playbook:
        export DUCKDNS_TOKEN="your-token"

- name: Require CERTBOT_EMAIL for certificate issuance
  ansible.builtin.assert:
    that:
      - certbot_email | length > 0
    fail_msg: >-
      CERTBOT_EMAIL is not set.  Export it before running the playbook:
        export CERTBOT_EMAIL="you@example.com"

- name: Request SSL Certificates
  ansible.builtin.command: >
    certbot certonly
    --authenticator dns-duckdns
    --preferred-challenges dns
    --dns-duckdns-token {{ duckdns_token }}
    --dns-duckdns-propagation-seconds 120
    -d {{ base_domain }}
    -d *.{{ base_domain }}
    --non-interactive --agree-tos --email {{ certbot_email }}
  args:
    creates: "/etc/letsencrypt/live/{{ base_domain }}/fullchain.pem"

- name: Create decoy directory
  ansible.builtin.file:
    path: /opt/decoy
    state: directory
    mode: '0755'

- name: Deploy Decoy docker-compose
  ansible.builtin.template:
    src: decoy-docker-compose.yml.j2
    dest: /opt/decoy/docker-compose.yml

- name: Start Decoy container
  ansible.builtin.shell: |
    docker compose -f /opt/decoy/docker-compose.yml up -d
  args:
    chdir: /opt/decoy

- name: Deploy Smart Redirector configuration
  ansible.builtin.template:
    src: smart-redirector.conf.j2
    dest: /etc/nginx/sites-available/aegis-redirector.conf
  notify: Reload Nginx
  tags: [redirector_config, update_decoy]

- name: Enable Smart Redirector
  ansible.builtin.file:
    src: /etc/nginx/sites-available/aegis-redirector.conf
    dest: /etc/nginx/sites-enabled/aegis-redirector.conf
    state: link

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx

- name: Validate Nginx configuration (certs + smart redirector)
  ansible.builtin.command: nginx -t
  changed_when: false
