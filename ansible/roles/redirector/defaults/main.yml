---
# Mythic callback paths that should be forwarded to Mythic from the C2 hostname.
# Keep this list tight; everything else is sent to the decoy.
mythic_callback_paths:
  - /api/.*
  - /graphql.*
  - /ws.*
  - /socket.io/.*

# IPs/CIDRs allowed as "operators" on ops.<base_domain> (Mythic/GoPhish admin/etc.).
# Empty list = all clients treated as operators there. Non-empty = only these CIDRs (others get decoy).
operator_allowlist: []

# Decoy: nginx serves static files from decoy_static_root (127.0.0.1:8080; copied from controller).
# Source on the Ansible controller defaults to <repo>/decoy-website/ (sibling of ansible/).
# Override: redirector_decoy_website_src: "/path/to/site"
decoy_static_root: "/opt/decoy/html"

# After stream SNI split: http{} terminates TLS on this port (not 443). Public 443 is stream layer.
redirector_internal_ssl_port: 8443

# Pwndrop HTTP listen port (must match pwndrop.ini http_port; upstream default is 80, not 8080).
pwndrop_http_port: 80

# Single LE lineage: certbot -d <base_domain> -d "*.<base_domain>" (default live dir is base_domain).
redirector_ssl_cert_path: "/etc/letsencrypt/live/{{ base_domain }}/fullchain.pem"
redirector_ssl_key_path: "/etc/letsencrypt/live/{{ base_domain }}/privkey.pem"

# DNS-01: Certbot authenticator name (pip package is certbot-dns-<suffix>, suffix = authenticator without leading "dns-").
# Examples: dns-duckdns (default), dns-cloudflare, dns-route53, dns-google, dns-azure, dns-rfc2136, …
# For non-DuckDNS, set redirector_certbot_dns_plugin_options to the flags your plugin needs (see Certbot DNS docs).
redirector_certbot_dns_plugin: dns-duckdns
# Non-DuckDNS: e.g. [ "--dns-cloudflare-credentials", "/root/.secrets/cloudflare.ini" ]
redirector_certbot_dns_plugin_options: []
# Override pip package if auto-derived name is wrong (rare); leave empty to derive from redirector_certbot_dns_plugin.
redirector_certbot_dns_pip_package: ""

# DuckDNS only: seconds to wait after TXT update before LE checks (60 is often too low for global resolvers).
# Override per run: export DUCKDNS_PROPAGATION_SECONDS=180
redirector_duckdns_propagation_seconds: 180
