---
# Contact email for Let's Encrypt (same as redirector/DuckDNS path: export CERTBOT_EMAIL).
- name: Resolve Certbot email from CERTBOT_EMAIL
  ansible.builtin.set_fact:
    certbot_email: "{{ lookup('env', 'CERTBOT_EMAIL') | trim }}"

- name: Require CERTBOT_EMAIL for HTTP-01 certificate issuance
  ansible.builtin.assert:
    that:
      - certbot_email | length > 0
    fail_msg: >-
      Set CERTBOT_EMAIL in the environment before Ansible (e.g. export CERTBOT_EMAIL=you@example.com).
      The ssl role uses it for certbot --email on all HTTP-challenge requests.
  when: stealth_level != "high"

- name: Install Certbot and Nginx
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
      - nginx
    state: present

- name: Create SSL directories
  ansible.builtin.file:
    path: "/etc/ssl/{{ service_name }}"
    state: directory

- name: Request SSL certificate (HTTP challenge)
  ansible.builtin.command: >
    certbot certonly --nginx -d {{ domain }}
    --non-interactive --agree-tos --email {{ certbot_email }}
    --cert-name {{ service_name }}
  args:
    creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  when: stealth_level != "high"

- name: Setup auto-renewal cron job
  ansible.builtin.cron:
    name: "Renew SSL for {{ service_name }}"
    minute: "0"
    hour: "12"
    job: "certbot renew --quiet --post-hook 'systemctl reload nginx'"

- name: Configure Nginx SSL
  ansible.builtin.template:
    src: nginx-ssl.conf.j2
    dest: "/etc/nginx/sites-available/{{ service_name }}-ssl.conf"

- name: Enable Nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ service_name }}-ssl.conf"
    dest: "/etc/nginx/sites-enabled/{{ service_name }}-ssl.conf"
    state: link

- name: Reload Nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
