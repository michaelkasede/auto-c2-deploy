---
- name: Wait for cloud-init to finish
  ansible.builtin.raw: test -f /var/lib/cloud/instance/boot-finished
  register: cloud_init_check
  until: cloud_init_check.rc == 0
  retries: 20
  delay: 10

- name: Wait for apt locks to be released
  ansible.builtin.raw: >
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
      sleep 5;
    done
  changed_when: false

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  retries: 3
  delay: 15
  register: apt_update
  until: apt_update is success

- name: Install common packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - jq
      - python3-pip
      - python3-docker
    state: present

- name: Install Docker
  ansible.builtin.shell: |
    curl -fsSL https://get.docker.com -o get-docker.sh
    sh get-docker.sh
    usermod -aG docker ubuntu
  args:
    creates: /usr/bin/docker

- name: Install Docker Compose
  ansible.builtin.get_url:
    url: https://github.com/docker/compose/releases/latest/download/docker-compose-Linux-x86_64
    dest: /usr/local/bin/docker-compose
    mode: '0755'

- name: Create service directories
  ansible.builtin.file:
    path: "/opt/{{ service_name }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: System hardening - disable server tokens in nginx globally
  ansible.builtin.copy:
    content: "server_tokens off;"
    dest: /etc/nginx/conf.d/hide-tokens.conf
  when: ansible_facts.packages['nginx'] is defined
