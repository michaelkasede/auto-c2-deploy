---
- name: Configure Red Team Infrastructure
  hosts: all
  become: yes
  gather_facts: yes
  roles:
    - common
    - stealth

- name: Configure Redirector (Central Entry Point)
  hosts: redirector
  become: yes
  roles:
    - redirector

- name: Distribute wildcard certs from redirector to private services
  hosts: mythic:gophish:evilginx:pwndrop
  become: yes
  gather_facts: no
  tasks:
    - name: Read wildcard fullchain from redirector
      slurp:
        src: "/etc/letsencrypt/live/{{ base_domain }}/fullchain.pem"
      delegate_to: "{{ groups['redirector'][0] }}"
      run_once: true
      register: wildcard_fullchain

    - name: Read wildcard private key from redirector
      slurp:
        src: "/etc/letsencrypt/live/{{ base_domain }}/privkey.pem"
      delegate_to: "{{ groups['redirector'][0] }}"
      run_once: true
      register: wildcard_privkey

    - name: Ensure certificate directory exists on private services
      file:
        path: /etc/aegis/certs
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy wildcard fullchain to private services
      copy:
        content: "{{ wildcard_fullchain.content | b64decode }}"
        dest: /etc/aegis/certs/fullchain.pem
        owner: root
        group: root
        mode: "0644"

    - name: Copy wildcard private key to private services
      copy:
        content: "{{ wildcard_privkey.content | b64decode }}"
        dest: /etc/aegis/certs/privkey.pem
        owner: root
        group: root
        mode: "0600"

- name: Configure Mythic
  hosts: mythic
  become: yes
  roles:
    - mythic

- name: Configure GoPhish
  hosts: gophish
  become: yes
  roles:
    - gophish

- name: Configure Evilginx
  hosts: evilginx
  become: yes
  roles:
    - evilginx

- name: Configure Pwndrop
  hosts: pwndrop
  become: yes
  roles:
    - pwndrop
