---
- name: Configure Red Team Infrastructure
  hosts: all
  become: yes
  gather_facts: yes
  roles:
    - common
    - stealth

- name: Configure Redirector (Central Entry Point)
  hosts: redirector
  become: yes
  roles:
    - redirector

- name: Configure Mythic
  hosts: mythic
  become: yes
  roles:
    - mythic

- name: Configure GoPhish
  hosts: gophish
  become: yes
  roles:
    - gophish

- name: Configure Evilginx
  hosts: evilginx
  become: yes
  roles:
    - evilginx

- name: Configure Pwndrop
  hosts: pwndrop
  become: yes
  roles:
    - pwndrop
